<!DOCTYPE html>
<html>

<head>

<title>AI Creator Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#111;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#00ffc3;
}

.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
background:#1c1c1c;
color:white;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
}

#result{
margin-top:15px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
min-height:80px;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:20px;
}

.tool{
background:#1c1c1c;
padding:20px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.tool:hover{
background:#00ffc3;
color:black;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Tools</h2>

<button onclick="generate('title')">Title</button>
<button onclick="generate('script')">Script</button>
<button onclick="generate('hook')">Hook</button>
<button onclick="generate('idea')">Video Idea</button>
<button onclick="generate('tags')">Tags</button>

</div>

<div class="main">

<h1>🚀 Creator AI Dashboard</h1>

<input id="topic" placeholder="Enter topic">

<div id="result">

AI result will appear here...

</div>

<div class="tools">

<div class="tool" onclick="generate('title')">Title Generator</div>

<div class="tool" onclick="generate('script')">Script Generator</div>

<div class="tool" onclick="generate('hook')">Viral Hook</div>

<div class="tool" onclick="generate('idea')">Video Idea</div>

<div class="tool" onclick="generate('tags')">Hashtags</div>

</div>

</div>

<script>

function generate(type){

let topic=document.getElementById("topic").value

if(topic==""){
document.getElementById("result").innerText="Enter topic first"
return
}

let result=""

switch(type){

case "title":
result="Top 5 Secrets About "+topic
break

case "script":
result="आज हम बात करने वाले हैं "+topic+" के बारे में..."
break

case "hook":
result="अगर आप "+topic+" नहीं जानते तो यह आपको चौंका देगा!"
break

case "idea":
result="3 shocking facts about "+topic
break

case "tags":
result="#viral #shorts #reels #trending #"+topic
break

}

document.getElementById("result").innerText=result

}

</script>

</body>

</html>
