<!DOCTYPE html>
<html>
<head>

<title>Creator AI Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:20px;
}

input{
padding:10px;
width:80%;
border-radius:6px;
border:none;
}

.category{
background:#1c1c1c;
margin-top:20px;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#00ffc3;
cursor:pointer;
}

#result{
margin-top:20px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🚀 Creator AI Tools Dashboard</h1>

<input id="topic" placeholder="Enter topic">

<div class="category">

<h2>🎬 Video Tools</h2>

<button onclick="generate('idea')">Video Idea</button>
<button onclick="generate('script')">Video Script</button>
<button onclick="generate('hook')">Viral Hook</button>

</div>

<div class="category">

<h2>📈 YouTube SEO</h2>

<button onclick="generate('title')">Title</button>
<button onclick="generate('description')">Description</button>
<button onclick="generate('tags')">Tags</button>

</div>

<div class="category">

<h2>🎨 Thumbnail Tools</h2>

<button onclick="generate('thumbnail')">Thumbnail Idea</button>

</div>

<div id="result">

AI result will appear here...

</div>
<input id="topic" placeholder="Enter topic">

<div id="result">
AI result will appear here...
</div>
<script>

function generate(type){

let topic=document.getElementById("topic").value

if(topic==""){
document.getElementById("result").innerText="Please enter topic"
return
}

let result=""

switch(type){

case "title":
result="Top 5 Secrets About "+topic
break

case "script":
result="आज हम बात करने वाले हैं "+topic+" के बारे में..."
break

case "hook":
result="अगर आप "+topic+" के बारे में नहीं जानते तो यह आपको चौंका देगा!"
break

case "idea":
result="3 shocking facts about "+topic
break

case "description":
result="In this video we explore "+topic
break

case "tags":
result=topic+", viral, shorts, trending"
break

case "thumbnail":
result="Shocked face + big text + arrow pointing to "+topic
break

}

document.getElementById("result").innerText=result

}

</script>

</body>

</html>
